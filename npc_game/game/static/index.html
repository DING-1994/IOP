<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ShareHouse RPG — Game</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d0d1a; color: #ddd; font-family: 'Courier New', monospace;
       display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
h1 { color: #f0c040; font-size: 15px; letter-spacing: 3px; margin-bottom: 16px; }
#app { border: 1px solid #333; border-radius: 8px; overflow: hidden; background: #1a1a2e; display: inline-block; }
#hud { background: #0d0d1a; padding: 5px 12px; border-bottom: 1px solid #333; font-size: 11px; color: #f0c040; }
canvas { display: block; image-rendering: pixelated; }
#controls-hint { background: #0a0a14; border-top: 1px solid #222; padding: 4px 10px;
                 font-size: 10px; color: #555; text-align: center; }
</style>
</head>
<body>
<h1>★ SHAREHOUSE RPG ★</h1>
<div id="app">
  <div id="hud"><span id="day-label">Day 1</span></div>
  <canvas id="game" width="540" height="396"></canvas>
  <div id="controls-hint">WASD / 方向键 移动</div>
</div>
<script src="render.js"></script>
<script src="game.js"></script>
</body>
</html>
